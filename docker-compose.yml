version: "3.9"

services:

  backend:
    build: .
    container_name: hallodoc-backend
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    volumes:
      - ./data/chroma_db:/app/chroma_db

  ollama:
    image: ollama/ollama
    container_name: hallodoc-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: